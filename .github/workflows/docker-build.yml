name: Build n8n-jianying Docker Images

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'n8n versions (comma-separated)'
        required: true
        default: '2.19.2,2.19.3,2.19.4'
      latest:
        description: 'Version to tag as :latest'
        required: true
        default: '2.19.4'

env:
  DOCKERHUB_IMAGE: hunseto001/n8n-jianying

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.array }}
    steps:
      - id: versions
        run: |
          IFS=',' read -ra VS <<< "${{ inputs.versions }}"
          json="["
          first=true
          for v in "${VS[@]}"; do
            v="$(echo "$v" | xargs)"
            if [ "$first" = true ]; then first=false; else json+=","; fi
            json+="\"$v\""
          done
          json+="]"
          echo "array=$json" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hunseto001
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          build-args: |
            N8N_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ matrix.version }}

  tag-latest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hunseto001
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push :latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKERHUB_IMAGE }}:latest \
            ${{ env.DOCKERHUB_IMAGE }}:${{ inputs.latest }}
